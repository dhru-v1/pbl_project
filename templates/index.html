<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Chess AI - Select Mode</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: #2a2a2a;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 400px;
            max-width: 90%;
        }

        h1 {
            margin-top: 0;
            color: #4CAF50;
        }

        .mode-group {
            text-align: left;
            margin: 20px 0;
            padding: 10px 20px;
            background: #333;
            border-radius: 6px;
        }

        .mode-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1em;
            cursor: pointer;
        }

        #color-select {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #555;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Simple Chess AI</h1>
        <form method="POST">
            <div class="mode-group">
                <p style="margin-top: 0; font-weight: bold;">Select Game Mode:</p>
                <label>
                    <input type="radio" name="mode" value="pvp" required checked> Player vs Player
                </label>
                <label>
                    <input type="radio" name="mode" value="pvb"> Player vs Bot
                </label>
                <label>
                    <input type="radio" name="mode" value="bvb"> Bot vs Bot
                </label>

                <div id="color-select">
                    <p style="margin-top: 0; font-weight: bold;">Choose Side:</p>
                    <label>
                        <input type="radio" name="color" value="white" checked> White
                    </label>
                    <label>
                        <input type="radio" name="color" value="black"> Black
                    </label>
                </div>
            </div>

            <button type="submit">Start Game</button>
        </form>
    </div>

    <script>
        const modeInputs = document.querySelectorAll('input[name="mode"]');
        const colorSelect = document.getElementById("color-select");

        modeInputs.forEach(input => {
            input.addEventListener('change', () => {
                if(input.value === "pvb") {
                    colorSelect.style.display = "block";
                } else {
                    colorSelect.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
